<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Avatar Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Random Avatar Generator</h1>
    <div class="avatar-box" id="avatar">
      <div class="face"></div>
      <div class="eyes"></div>
      <div class="mouth"></div>
      <div class="hair"></div>
    </div>
    <button id="generateBtn">Generate New Avatar</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
